<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>骑行头盔 - 用户站</title>
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100vh; width: 100vw; }
    .panel {
      position: fixed; left: 12px; top: 12px;
      background: rgba(255,255,255,0.95);
      padding: 10px 12px; border-radius: 10px;
      font-family: system-ui, sans-serif; font-size: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      max-width: 86vw;
    }
    .row { margin: 6px 0; }
    button { padding: 8px 10px; }
    code { user-select: all; }
  </style>

  <!-- 高德地图 JS API -->
  <script>
    window._AMapSecurityConfig = {
      // 如果你的高德控制台给了 “安全密钥（JSAPI安全密钥）”，再填到这里
      securityJsCode: "44753867fab57990a91227566e23766d"
    };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=f7922f62f89a287b3b34ae97e383a1e8"></script>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <div class="row"><strong>骑行头盔用户站（高德地图）</strong></div>
    <div class="row">状态：<span id="status">加载中…</span></div>
    <div class="row">坐标：<code id="pos">-</code></div>
    <div class="row">
      <button id="loc">定位到我</button>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const posEl = document.getElementById("pos");

    const map = new AMap.Map("map", {
      zoom: 14,
      center: [116.397428, 39.90923] // 默认北京天安门
    });

    const marker = new AMap.Marker({ position: map.getCenter() });
    map.add(marker);
    statusEl.textContent = "地图已加载";

    document.getElementById("loc").onclick = () => {
      statusEl.textContent = "请求定位…";
      navigator.geolocation.getCurrentPosition(
        (p) => {
          const lng = p.coords.longitude;
          const lat = p.coords.latitude;
          posEl.textContent = `${lng.toFixed(6)}, ${lat.toFixed(6)}`;
          const ll = [lng, lat];
          marker.setPosition(ll);
          map.setCenter(ll);
          statusEl.textContent = "定位成功";
        },
        (e) => {
          statusEl.textContent = "定位失败：" + e.message;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 1000 }
      );
    };
  </script>
</body>
</html>
