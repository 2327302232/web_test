<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>dkrx relay demo</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 16px; max-width: 720px; margin: 0 auto; }
    button { padding: 10px 14px; margin: 6px 0; }
    pre { background:#111; color:#0f0; padding:12px; border-radius:8px; overflow:auto; }
    input { width: 100%; padding: 10px; margin: 6px 0 10px; }
  </style>
</head>
<body>
  <h2>手机 → Worker → 电脑（中转测试）</h2>

  <h3>手机端：发送</h3>
  <input id="msg" placeholder="输入要发给电脑的内容" />
  <button id="send">发送到电脑</button>
  <div id="sendStatus"></div>

  <h3>电脑端：接收（每 1 秒刷新）</h3>
  <pre id="recv">等待消息…</pre>

  <script>
    const API = "https://api.dkrx.dpdns.org";

    async function poll() {
      try {
        const r = await fetch(API + "/poll", { cache: "no-store" });
        const data = await r.json();
        document.getElementById("recv").textContent =
          JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById("recv").textContent = "poll error: " + e;
      }
    }

    document.getElementById("send").onclick = async () => {
      const text = document.getElementById("msg").value || ("hello @ " + new Date().toISOString());
      const r = await fetch(API + "/push", { method: "POST", body: text });
      document.getElementById("sendStatus").textContent =
        "send: " + r.status + " " + (await r.text());
    };

    poll();
    setInterval(poll, 1000);
  </script>
</body>
</html>
