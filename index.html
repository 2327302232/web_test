<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web Control Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 16px; }
    .card { max-width: 520px; margin: 0 auto; border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    button { width: 100%; padding: 12px; font-size: 16px; }
    pre { background: #f6f8fa; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <div class="card">
    <h1>最小验证页</h1>
    <p>这一步只验证：手机/电脑能从公网打开页面。</p>
    <button onclick="test()">点我测试</button>
    <pre id="log"></pre>
  </div>

  <script>
    function log(s){ document.getElementById('log').textContent += s + "\n"; }
    function test(){
      log("clicked at " + new Date().toISOString());
    }
    log("loaded at " + new Date().toISOString());
  </script>
</body>
</html>
